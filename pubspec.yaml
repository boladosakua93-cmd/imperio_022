name: imperio_022
description: "Aplicativo profissional de gestão de lava-jato com autenticação, módulos operacionais e financeiros."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.0.0

  # HTTP & Networking
  http: ^1.1.0

  # Storage & Local Database
  shared_preferences: ^2.2.0
  sqflite: ^2.2.8
  path: ^1.8.0

  # Image Handling
  image_picker: ^0.8.9
  image: ^4.0.0
  path_provider: ^2.1.0

  # PDF Generation
  pdf: ^3.10.0

  # WhatsApp Integration
  url_launcher: ^6.2.0

  # Date & Time
  intl: ^0.19.0
  timezone: ^0.9.0

  # Logging
  logger: ^2.0.0

  # Utils
  uuid: ^4.0.0
  get: ^4.6.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
